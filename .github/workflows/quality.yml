name: Local Grounded Assistant CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: AAMU-GDG-AI-Chatbot-main/AAMU-GDG-AI-Chatbot-main/frontend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AAMU-GDG-AI-Chatbot-main/AAMU-GDG-AI-Chatbot-main/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Generate local bulletin index
        run: npm run kb:build
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Evaluate grounded retrieval
        run: npm run kb:evaluate
      - name: Build production application
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev
